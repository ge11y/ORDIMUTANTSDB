    }

    function renderTags(tags) {
      if (!Array.isArray(tags) || tags.length === 0) {
        return '<div class="card-meta">Satributes: none listed</div>';
      }
      return '<div class="tag-wrap">' + tags.map(t => `<div class="tag">${t}</div>`).join('') + '</div>';
    }

    function formatSuggestionTitle(nft) {
      if (nft.name) return nft.name;
      if (nft.number != null) return "OrdiMutant #" + nft.number;
      return nft.id;
    }

    function formatSuggestionMeta(nft) {
      const parts = [];
      if (nft.number != null) parts.push("Number: " + nft.number);
      if (nft.inscription_number != null) parts.push("Insc #: " + nft.inscription_number);
      if (nft.dna) parts.push("DNA: " + nft.dna);
      return parts.join(" • ");
    }

    function getMatches(query) {
      const q = normalize(query);
      if (!q) return [];

      const numericOnly = q.replace(/^#/, "");
      const isDigits = /^\d+$/.test(numericOnly);
      const results = [];

      for (const nft of NFTS) {
        const name = normalize(nft.name);
        const numberStr = nft.number != null ? String(nft.number) : "";
        const inscStr = nft.inscription_number != null ? String(nft.inscription_number) : "";

        let score = -1;

        if (isDigits) {
          if (numberStr === numericOnly) score = 100;
          else if (inscStr === numericOnly) score = 95;
          else if (name.includes("#" + numericOnly)) score = 90;
          else if (name.startsWith(numericOnly)) score = 50;
        }

        if (score < 0) {
          if (name === q) score = 100;
          else if (name.startsWith(q)) score = 92;
          else if (name.includes(q)) score = 82;
          else if (inscStr.startsWith(q)) score = 78;
          else if (numberStr.startsWith(q)) score = 76;
        }

        if (score >= 0) {
          results.push({ ...nft, _score: score });
        }
      }

      results.sort((a, b) => {
        if (b._score !== a._score) return b._score - a._score;
        return a.rank - b.rank;
      });

      return results.slice(0, 12);
    }

    function renderSuggestions(matches) {
      const box = document.getElementById("suggestions");
      if (!matches.length) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }

      box.innerHTML = matches.map((nft, idx) => `
        <div class="suggestion" data-index="${idx}">
          <div class="s-left">
            <div class="s-title">${formatSuggestionTitle(nft)}</div>
            <div class="s-meta">${formatSuggestionMeta(nft)}</div>
          </div>
          <div class="s-rank">#${nft.rank} • ${statusLabel(nft.status)}</div>
        </div>
      `).join("");

      box.style.display = "block";

      Array.from(box.querySelectorAll(".suggestion")).forEach((el, idx) => {
        el.addEventListener("click", () => {
          chooseMatch(matches[idx]);
        });
      });
    }

    function chooseMatch(nft) {
      document.getElementById("searchInput").value = nft.name || (nft.number != null ? nft.number : nft.inscription_number || "");
      document.getElementById("suggestions").style.display = "none";
      renderResult(nft);
    }

    function renderResult(nft) {
      const container = document.getElementById("result");
      if (!nft) {
        container.innerHTML = '<div class="empty-state">Start typing to search by number, name, or inscription number.</div>';
        return;
      }

      const safeName = nft.name || ("OrdiMutant #" + (nft.number ?? ""));
      const dna = nft.dna || "Unknown";
      const status = nft.status || "";
      const satributesHtml = renderTags(nft.satributes);
      const inscText = nft.inscription_number != null ? nft.inscription_number : "Unknown";

      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">${safeName}</div>
              <div class="card-meta">DNA: ${dna} • Inscription #: ${inscText}</div>
            </div>
            <div class="${statusClass(status)}">${statusLabel(status)}</div>
          </div>
          <div class="meta-stack">
            <div class="card-meta">Satributes</div>
            ${satributesHtml}
          </div>
          <div class="img-wrapper">
            <img id="nftImage" alt="${safeName}" />
            <div class="rank-badge"><span>Rank</span> #${nft.rank}</div>
          </div>
        </div>
      `;

      const imgEl = document.getElementById("nftImage");
      attachImageWithFallback(imgEl, nft.id);
    }

    const input = document.getElementById("searchInput");
    input.addEventListener("input", function() {
      const q = this.value.trim();
      const matches = getMatches(q);
      renderSuggestions(matches);

      if (matches.length === 1) {
        // do not auto-render immediately; let user confirm
      } else if (!q) {
        renderResult(null);
      }
    });

    input.addEventListener("keydown", function(e) {
      const box = document.getElementById("suggestions");
      const items = Array.from(box.querySelectorAll(".suggestion"));
      let active = items.findIndex(el => el.classList.contains("active"));

      if (e.key === "ArrowDown" && items.length) {
        e.preventDefault();
        if (active >= 0) items[active].classList.remove("active");
        active = (active + 1) % items.length;
        items[active].classList.add("active");
      } else if (e.key === "ArrowUp" && items.length) {
        e.preventDefault();
        if (active >= 0) items[active].classList.remove("active");
        active = active <= 0 ? items.length - 1 : active - 1;
        items[active].classList.add("active");
      } else if (e.key === "Enter") {
        e.preventDefault();
        const matches = getMatches(this.value.trim());
        if (active >= 0 && matches[active]) {
          chooseMatch(matches[active]);
        } else if (matches.length > 0) {
          chooseMatch(matches[0]);
        } else {
          renderResult(null);
        }
      }
    });

    document.getElementById("searchBtn").addEventListener("click", function() {
      const matches = getMatches(input.value.trim());
      if (matches.length > 0) chooseMatch(matches[0]);
      else renderResult(null);
    });

    document.addEventListener("click", function(e) {
      const wrap = document.querySelector(".search-wrap");
      if (!wrap.contains(e.target)) {
        document.getElementById("suggestions").style.display = "none";
      }
    });

    renderResult(null);
  </script>
</body>
</html>
